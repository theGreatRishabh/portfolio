<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/portfolio/assets/favicon.svg"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Rishabh - Full Stack Developer</title>
    <meta
      name="description"
      content="Portfolio of Rishabh, a full stack developer with over 8 years of experience in building high-performance web and mobile applications using modern technologies."
    />
    <meta
      name="keywords"
      content="Rishabh, full stack developer, react, node.js, typescript, web development, mobile app development, portfolio"
    />
    <link rel="canonical" href="https://your-domain.com/" />
    <!-- Replace with your actual domain -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com/" />
    <!-- Replace with your actual domain -->
    <meta property="og:title" content="Rishabh - Full Stack Developer" />
    <meta
      property="og:description"
      content="Portfolio of Rishabh, a full stack developer with over 8 years of experience in building high-performance web and mobile applications."
    />
    <meta property="og:image" content="https://your-domain.com/og-image.jpg" />
    <!-- Replace with a link to a preview image -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-domain.com/" />
    <!-- Replace with your actual domain -->
    <meta property="twitter:title" content="Rishabh - Full Stack Developer" />
    <meta
      property="twitter:description"
      content="Portfolio of Rishabh, a full stack developer with over 8 years of experience in building high-performance web and mobile applications."
    />
    <meta
      property="twitter:image"
      content="https://your-domain.com/og-image.jpg"
    />
    <!-- Replace with a link to a preview image -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "sans-serif"],
            },
            colors: {
              "panel-about": "#2a4d69",
              "panel-services": "#c02942",
              "panel-portfolio": "#458b74",
              "panel-contact": "#d98c56",
              "panel-text": "#ffffff",
              "left-bg": "#2c3e50",
              "brand-bg": "#10121B",
              "brand-surface": "#1B1E28",
              "brand-primary": "#7A67F8",
              "brand-text-primary": "#F5F5F7",
              "brand-text-secondary": "#A9AABC",
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease-in-out forwards",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
            },
          },
        },
      };
    </script>

    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-brand-bg text-brand-text-primary font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
